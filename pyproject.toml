[tool.flet]
app_name = "Reparos Marica"
product_name = "Gerenciamento dos Reparos"
description = "Sistema de Gerenciamento dos Reparos - Marica RJ"
org = "br.marica.reparos"
version = "1.0.0"

[tool.flet.android]
permissions = [
    "android.permission.INTERNET",
    "android.permission.READ_EXTERNAL_STORAGE",
    "android.permission.WRITE_EXTERNAL_STORAGE",
]

# CORREÇÃO: força wakelock_plus 1.5.0+ que tem build.gradle compatível
# com Android SDK 36 (sem flutter.compileSdkVersion)
[tool.flet.flutter.pubspec.dependency_overrides]
wakelock_plus = ">=1.5.0"
