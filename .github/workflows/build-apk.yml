name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4.2.2

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Configurar Java 17
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar Flutter 3.24.5
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Aceitar licenças Android (método direto)
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          echo "601085b94cd77f0b54ff86406957099ebe79c4d6" > $ANDROID_SDK_ROOT/licenses/android-googletv-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $ANDROID_SDK_ROOT/licenses/google-gdk-license
          echo "e9acab5b5fbb560a72cfaecce8946896ff6aab9d" > $ANDROID_SDK_ROOT/licenses/mips-android-sysimage-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          yes | flutter doctor --android-licenses || true
          echo "Licenças aceitas!"

      - name: Instalar Flet CLI
        run: pip install flet==0.24.1

      - name: Compilar APK
        run: flet build apk --verbose 2>&1

      - name: Listar APKs gerados
        run: find build/ -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      - name: Publicar APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: reparos-apk
          path: build/apk/*.apk
          retention-days: 30
