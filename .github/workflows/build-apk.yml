name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite rodar manualmente pelo site do GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🐦 Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: 📦 Instalar Flet CLI
        run: pip install flet==0.24.1

      - name: 🔧 Instalar dependências do projeto
        run: |
          pip install -r requirements.txt || true

      - name: 🏗️ Compilar APK Android
        run: flet build apk --verbose

      - name: 📤 Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: reparos-apk
          path: build/apk/*.apk
          retention-days: 30

      - name: ✅ Build concluído!
        run: |
          echo "APK gerado com sucesso!"
          echo "Vá em: Actions → último workflow → Artifacts → reparos-apk"
          ls -lh build/apk/ || echo "Verificar pasta build/"
