name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4.2.2

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Configurar Java 17
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: "17"

      - name: Aceitar licenças Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          printf '24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          printf 'd975f751698a77b662f1254ddbeed3901e976f5a' \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          yes | sdkmanager --licenses || true

      - name: REMOVER Flutter pré-instalado do runner
        run: |
          echo "=== Flutter ANTES ==="
          which flutter 2>/dev/null && flutter --version || echo "Flutter não encontrado no PATH"
          
          # Remove o Flutter pré-instalado pelo runner
          sudo rm -rf /opt/hostedtoolcache/flutter 2>/dev/null || true
          sudo rm -f /usr/local/bin/flutter 2>/dev/null || true
          sudo rm -f /usr/bin/flutter 2>/dev/null || true
          
          # Limpa o cache do shell
          hash -r 2>/dev/null || true
          
          echo "=== Flutter DEPOIS ==="
          which flutter 2>/dev/null && echo "AINDA PRESENTE - problema!" || echo "✅ Flutter removido com sucesso"

      - name: Instalar flet 0.27.6
        run: |
          pip install "flet==0.27.6" "flet-cli==0.27.6" --force-reinstall --no-cache-dir
          python -c "import flet; print('✅ flet version:', flet.version.version)"
          
          # Mostra qual flet será usado
          FLET=$(python -c "import sys,os; print(os.path.join(os.path.dirname(sys.executable),'flet'))")
          echo "flet binário: $FLET"
          $FLET --version

      - name: Compilar APK (flet instala Flutter 3.27.4 automaticamente)
        run: |
          FLET=$(python -c "import sys,os; print(os.path.join(os.path.dirname(sys.executable),'flet'))")
          echo "Usando: $FLET"
          $FLET --version
          
          # Executa o build — flet 0.27.6 vai baixar e instalar Flutter 3.27.4
          $FLET build apk --verbose 2>&1

      - name: Listar APKs gerados
        run: find build/ -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      - name: Publicar APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: reparos-apk
          path: build/apk/*.apk
          retention-days: 30
