name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4.2.2

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Configurar Java 17
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: "17"

      - name: Aceitar licenças Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          printf '24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          printf 'd975f751698a77b662f1254ddbeed3901e976f5a' \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          yes | sdkmanager --licenses || true

      - name: Limpar flet antigo e instalar flet 0.27.6
        run: |
          # Remove qualquer flet existente no sistema
          pip uninstall flet flet-cli flet-runtime flet-embed flet-web -y 2>/dev/null || true
          pip cache purge
          # Instala versão correta
          pip install "flet==0.27.6" "flet-cli==0.27.6" --no-cache-dir
          # Confirma
          python -c "import flet; print('flet version:', flet.version.version)"
          # Mostra onde está o executável flet
          python -c "import shutil; print('flet em:', shutil.which('flet'))"

      # NÃO instala Flutter — o flet 0.27.6 instala o Flutter 3.27.4 automaticamente
      - name: Compilar APK
        run: |
          # Garante que o flet do PATH é o 0.27.6, não um sistema antigo
          FLET_BIN=$(python -c "import sys, os; print(os.path.join(os.path.dirname(sys.executable), 'flet'))")
          echo "Usando flet em: $FLET_BIN"
          $FLET_BIN --version
          $FLET_BIN build apk --verbose 2>&1

      - name: Listar APKs gerados
        run: find build/ -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      - name: Publicar APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: reparos-apk
          path: build/apk/*.apk
          retention-days: 30
