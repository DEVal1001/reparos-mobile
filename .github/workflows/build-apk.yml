name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4.2.2

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Configurar Java 17
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar Flutter 3.24.5
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: false

      - name: Aceitar licencas Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          printf '24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\n84831b9409646a918e30573bab4c9c91346d8abd' > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          printf 'd975f751698a77b662f1254ddbeed3901e976f5a' > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          yes | flutter doctor --android-licenses || true

      - name: Instalar flet 0.24.1
        run: |
          echo "flet==0.24.1" > requirements.txt
          pip install flet==0.24.1

      - name: Compilar APK com patch wakelock
        run: |
          python watcher.py &
          WPID=$!
          echo "Watcher PID $WPID iniciado"
          flet build apk --verbose 2>&1
          CODE=$?
          kill $WPID 2>/dev/null || true
          exit $CODE

      - name: Listar APKs
        run: find build/ -name "*.apk" 2>/dev/null || echo "Nenhum APK"

      - name: Publicar APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: reparos-apk
          path: build/apk/*.apk
          retention-days: 30
